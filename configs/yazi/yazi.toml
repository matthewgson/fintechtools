# configs/yazi/yazi.toml — synced to CIRCE by build_container.sh.
#
# PDFs/EPUBs open in bookokrat (terminal reader) in a new tmux split via the
# bookokrat-split wrapper (~/.local/bin, synced by sync_configs.sh). Images
# preview in-terminal via yazi's built-in graphics; other types use yazi's
# default openers.

[opener]
bookokrat = [
  # Open in bookokrat in a new tmux split (terminal reader).
  { run = 'bookokrat-split "$1"', desc = "bookokrat (tmux split)", orphan = true },
]

[open]
prepend_rules = [
  { url = "*.pdf",  use = "bookokrat" },
  { url = "*.epub", use = "bookokrat" },
]
