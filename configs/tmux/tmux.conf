# ~/.config/tmux/tmux.conf — container multiplexer config (synced by sync_configs.sh)
#
# This replaces zellij in the FinTech container. A fresh tmux session creates in
# ~0.03s even under proot (PROOT_NO_SECCOMP=1), vs ~1.3-1.5s for zellij, because
# tmux is a lean C server with no WASM plugin runtime. See the Dockerfile Stage 1
# note for the full rationale.
#
# Loaded from $XDG_CONFIG_HOME/tmux/tmux.conf (the container sets
# XDG_CONFIG_HOME=$HOME/.config), so no ~/.tmux.conf is needed.

# ─── Terminal / color ────────────────────────────────────────────────────────
# 24-bit truecolor. default-terminal advertises 256-color; the override adds the
# Tc (truecolor) capability for the outer terminal so nvim/yazi render full color
# through SSH + proot. COLORTERM=truecolor is also exported in zshenv.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"

# ─── Responsiveness ──────────────────────────────────────────────────────────
# escape-time 0: no delay after <Esc>. Critical for Neovim — the default 500ms
# makes leaving insert mode feel laggy. Safe over SSH with focus-events on.
set -sg escape-time 0
# Pass focus in/out events through to apps (nvim :autoread, lualine, etc.).
set -g focus-events on
# Bigger scrollback than the 2000-line default.
set -g history-limit 50000

# ─── Shell ───────────────────────────────────────────────────────────────────
# Spawn panes as a zsh LOGIN shell so /etc/zsh/zshenv + zshrc (PATH, starship,
# zoxide, aliases) are sourced. Only default-command (NOT default-shell): tmux's
# checkshell() misreports /bin/zsh under udocker's fakechroot on `source-file`,
# which aborts live reloads at that line — default-command runs `zsh -l` anyway.
set -g default-command "/bin/zsh -l"

# ─── Mouse + indexing ────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1            # windows start at 1 (0 is a reach on the keyboard)
setw -g pane-base-index 1      # panes too
set -g renumber-windows on     # keep window numbers gapless after closing one

# ─── Copy mode: vi keys ──────────────────────────────────────────────────────
setw -g mode-keys vi
# v to start selection, y to yank (matches Neovim muscle memory).
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Keybinds ────────────────────────────────────────────────────────────────
# Prefix stays C-b (tmux default). Change here if you want C-a:
#   unbind C-b ; set -g prefix C-a ; bind C-a send-prefix

# Reload this config without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Intuitive splits: | horizontal, - vertical, both keeping the current dir.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# New windows also inherit the current dir.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing (prefix + H/J/K/L, hold to repeat).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Status bar: Catppuccin (mocha) — mirrors the Mac ────────────────────────
# Baked into the image at /usr/local/share/tmux-plugins/catppuccin (Dockerfile
# Stage 8f) and sourced directly — no TPM, no ~/.config plugin clone, so it stays
# on the fast node-local rootfs and adds no plugin-manager handshake at launch.
# (The SSH-vs-local cue now lives in the starship prompt's warm 'ssh' badge.)
set -g status-position top
set -g status-interval 5

# Catppuccin (v2) options — must be set BEFORE the theme is sourced.
set -g @catppuccin_flavor 'mocha'           # latte | frappe | macchiato | mocha
set -g @catppuccin_date_time_text "%a %b %d  %H:%M"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load the theme (provides the #{E:@catppuccin_status_*} modules used below).
# Guarded so tmux started where the image path is absent falls back cleanly.
if-shell '[ -f /usr/local/share/tmux-plugins/catppuccin/catppuccin.tmux ]' \
  "run '/usr/local/share/tmux-plugins/catppuccin/catppuccin.tmux'"

# Assemble the bar from Catppuccin modules AFTER the theme loads (same as Mac).
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g pane-active-border-style "fg=#{?SSH_CONNECTION,colour35,cyan}"
