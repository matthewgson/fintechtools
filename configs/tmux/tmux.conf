# ~/.config/tmux/tmux.conf — container multiplexer config (synced by sync_configs.sh)
#
# Keybindings mirror the Mac config (~/.config/tmux/tmux.conf) so the muscle
# memory is identical local vs. container. The container-specific bits are: the
# catppuccin theme is baked into the image and sourced directly (no TPM / no
# ~/.config plugin clone — keeps it on the fast node-local rootfs), the shell is
# zsh-login, and the clipboard uses OSC52 (yanks reach the Mac clipboard over SSH,
# in place of the Mac's pbcopy). Loaded from $XDG_CONFIG_HOME/tmux/tmux.conf.

# ─── Prefix: Ctrl+Space (Mac muscle memory) + Ctrl+b fallback ────────────────
# prefix2 = C-b ALSO triggers the prefix, so this (container) tmux stays reachable
# even when C-Space is captured before it gets here — e.g. an outer/local tmux you
# SSH'd from (nested tmux both using C-Space), or a terminal/OS shortcut. Use
# whichever key actually reaches this server.
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix   # press Ctrl+Space twice to send a literal Ctrl+Space

# ─── Terminal / color ────────────────────────────────────────────────────────
# 24-bit truecolor for the outer SSH terminal (ghostty/kitty) so nvim/yazi render
# full colour. COLORTERM=truecolor is also exported in zshenv.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"

# ─── Responsiveness ──────────────────────────────────────────────────────────
set -sg escape-time 0       # no delay after <Esc> — critical for Neovim
set -g focus-events on      # pass focus in/out to apps (nvim :autoread, lualine)
set -g history-limit 50000

# ─── Shell ───────────────────────────────────────────────────────────────────
# Spawn panes as a zsh LOGIN shell so /etc/zsh/zshenv + zshrc (PATH, starship,
# zoxide, aliases) are sourced regardless of how tmux was launched.
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

# ─── Mouse + indexing ────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes too
set -g renumber-windows on     # keep window numbers gapless after closing one

# ─── Splits: | and - , open in the current pane's directory ──────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Seamless nav: Ctrl+h/j/k/l across nvim splits AND tmux panes ─────────────
# Needs christoomey/vim-tmux-navigator on the nvim side (shipped in LazyVim here).
# The check sees if the active pane runs (n)vim/fzf; if so the key passes through
# to nvim, otherwise tmux switches panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
# Same keys also work while in copy mode:
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# Ctrl+l used to clear the screen — get it back via prefix Ctrl+l:
bind C-l send-keys 'C-l'

# ─── Prefix-based pane navigation (fallback): prefix then h/j/k/l ─────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Resize: prefix then H/J/K/L (repeatable, hold to keep resizing) ─────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Copy mode: vi keys, v to select, y to yank ──────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# OSC52: y also reaches the *Mac* clipboard through the SSH terminal (ghostty/
# kitty), the container-side equivalent of the Mac config's `pbcopy` pipe.
set -g set-clipboard on

# ─── Floating scratch terminal ───────────────────────────────────────────────
# prefix g -> floating popup attached to a persistent 'scratch' session. State
# persists between toggles. Close with `prefix d` (keeps it) or `exit` (destroys).
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E \
  "tmux new-session -A -s scratch"

# ─── Quality of life ─────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ─── Status bar: Catppuccin (mocha) — mirrors the Mac ────────────────────────
# Baked into the image at /usr/local/share/tmux-plugins/catppuccin (Dockerfile)
# and sourced directly — no TPM, no ~/.config plugin clone, so it stays on the
# fast node-local rootfs and adds no plugin-manager handshake at launch.
set -g status-position top
set -g status-interval 5

# Catppuccin (v2) options — must be set BEFORE the theme is sourced.
set -g @catppuccin_flavor 'mocha'           # latte | frappe | macchiato | mocha
set -g @catppuccin_date_time_text "%a %b %d  %H:%M"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load the theme (provides the #{E:@catppuccin_status_*} modules used below).
# Guarded so tmux started where the image path is absent just falls back cleanly.
if-shell '[ -f /usr/local/share/tmux-plugins/catppuccin/catppuccin.tmux ]' \
  "run '/usr/local/share/tmux-plugins/catppuccin/catppuccin.tmux'"

# Assemble the bar from Catppuccin modules AFTER the theme loads (same as Mac).
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
