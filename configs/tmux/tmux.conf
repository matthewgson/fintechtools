# ~/.config/tmux/tmux.conf — container multiplexer config (synced by sync_configs.sh)
#
# This replaces zellij in the FinTech container. A fresh tmux session creates in
# ~0.03s even under proot (PROOT_NO_SECCOMP=1), vs ~1.3-1.5s for zellij, because
# tmux is a lean C server with no WASM plugin runtime. See the Dockerfile Stage 1
# note for the full rationale.
#
# Loaded from $XDG_CONFIG_HOME/tmux/tmux.conf (the container sets
# XDG_CONFIG_HOME=$HOME/.config), so no ~/.tmux.conf is needed.

# ─── Terminal / color ────────────────────────────────────────────────────────
# 24-bit truecolor. default-terminal advertises 256-color; the override adds the
# Tc (truecolor) capability for the outer terminal so nvim/yazi render full color
# through SSH + proot. COLORTERM=truecolor is also exported in zshenv.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"

# ─── Responsiveness ──────────────────────────────────────────────────────────
# escape-time 0: no delay after <Esc>. Critical for Neovim — the default 500ms
# makes leaving insert mode feel laggy. Safe over SSH with focus-events on.
set -sg escape-time 0
# Pass focus in/out events through to apps (nvim :autoread, lualine, etc.).
set -g focus-events on
# Bigger scrollback than the 2000-line default.
set -g history-limit 50000

# ─── Shell ───────────────────────────────────────────────────────────────────
# Spawn panes as zsh. The container also exports SHELL=/bin/zsh in zshenv, but be
# explicit so tmux is correct regardless of how it was launched. Login shell (-l)
# so /etc/zsh/zshenv + zshrc (PATH, starship, zoxide, aliases) are sourced.
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

# ─── Mouse + indexing ────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1            # windows start at 1 (0 is a reach on the keyboard)
setw -g pane-base-index 1      # panes too
set -g renumber-windows on     # keep window numbers gapless after closing one

# ─── Copy mode: vi keys ──────────────────────────────────────────────────────
setw -g mode-keys vi
# v to start selection, y to yank (matches Neovim muscle memory).
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Keybinds ────────────────────────────────────────────────────────────────
# Prefix stays C-b (tmux default). Change here if you want C-a:
#   unbind C-b ; set -g prefix C-a ; bind C-a send-prefix

# Reload this config without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Intuitive splits: | horizontal, - vertical, both keeping the current dir.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# New windows also inherit the current dir.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing (prefix + H/J/K/L, hold to repeat).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-style "bg=default fg=white"
set -g status-left "#[bold] #S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=cyan]#h #[fg=white]%H:%M "
setw -g window-status-current-style "fg=black bg=cyan bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
set -g pane-active-border-style "fg=cyan"
